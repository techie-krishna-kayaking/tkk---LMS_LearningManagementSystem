version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: tkk_lms_postgres
    environment:
      POSTGRES_DB: tkk_lms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tkk_lms_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
